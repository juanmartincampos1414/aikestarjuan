    <!--
      No-flash dark-mode bootstrap. Runs synchronously before the React app
      mounts so the `dark` class is applied on <html> before first paint and
      users never see a white flash when their saved theme is dark.
      Keys mirror what next-themes uses (storageKey="aikestar-theme").
    -->
    <script>
      (function () {
        try {
          var key = 'aikestar-theme';
          var stored = localStorage.getItem(key);
          var isDark;
          if (stored === 'dark') {
            isDark = true;
          } else if (stored === 'light') {
            isDark = false;
          } else {
            // system / unset → follow OS preference
            isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          var root = document.documentElement;
          if (isDark) {
            root.classList.add('dark');
            root.style.colorScheme = 'dark';
          } else {
            root.classList.remove('dark');
            root.style.colorScheme = 'light';
          }
        } catch (e) {
          // Best-effort: if storage is blocked we just stay on the default (light).
        }
      })();
    </script>
