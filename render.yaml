# Render Blueprint para Aikestar — crea la base PostgreSQL y el web service Node.
# Para usarlo: en Render → New → Blueprint → conectá el repo de GitHub con este archivo.
# Docs: https://render.com/docs/blueprint-spec
databases:
  - name: aikestar-db
    databaseName: aikestar
    user: aikestar
    plan: free   # gratis ~30 días; para producción real subir a un plan pago

services:
  - type: web
    name: aikestar
    runtime: node
    plan: free   # gratis (se duerme tras inactividad); subir a 'starter' (~7USD/mes) para always-on
    # --include=dev: Render setea NODE_ENV=production y npm omitiría las devDependencies
    # (vite, esbuild, drizzle-kit, tsx) necesarias para compilar. Forzamos instalarlas.
    # drizzle-kit push es NO-FATAL (|| true): en el primer deploy crea las 52 tablas,
    # pero en deploys posteriores puede chocar con drift de PKs en tablas con datos.
    # Los cambios de esquema incrementales los aplican las migraciones de arranque
    # (server/migrations/00XX), así que un push fallido no debe romper el build.
    buildCommand: npm install --include=dev && (npx drizzle-kit push --force || echo "drizzle push omitido; el esquema se aplica por migraciones de arranque") && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true            # Render genera un secreto seguro
      - key: DATABASE_URL
        fromDatabase:
          name: aikestar-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false                    # se carga a mano en el dashboard (secreto)
      - key: APP_BASE_URL
        value: https://app.aikestar.com   # usado para los back_url/notification_url de MercadoPago
      - key: MP_ACCESS_TOKEN
        sync: false                    # Access Token de MercadoPago (secreto)
      # - key: MP_WEBHOOK_SECRET       # opcional: validación de firma del webhook
      #   sync: false
      # --- Opcionales (dejar sin valor hasta que tengas las claves) ---
      # - key: AI_INTEGRATIONS_GEMINI_API_KEY   # solo transcripción de audio de WhatsApp
      #   sync: false
      # - key: AI_INTEGRATIONS_GEMINI_BASE_URL
      #   sync: false
      # - key: STRIPE_SECRET_KEY                # registro de cuentas y cobros
      #   sync: false
      # - key: SENDGRID_API_KEY                 # emails
      #   sync: false
